services:
  mongo:
    image: mongo:7
    container_name: collab-docs-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collab-docs-api
    restart: unless-stopped
    environment:
      - PORT=${PORT:-3000}
      - MONGO_URI=mongodb://mongo:27017
      - DATABASE_NAME=collab_docs
      - SEED_COUNT=${SEED_COUNT:-10000}
      - SEED_BATCH_SIZE=${SEED_BATCH_SIZE:-1000}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3100:3000"

volumes:
  mongo_data:
    driver: local